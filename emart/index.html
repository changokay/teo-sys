const CAT_ICONS = {"\ud734\ub300\ud3f0": "\ud83d\udcf1", "\ub0c9\uc7a5\uace0": "\ud83e\uddca", "TV": "\ud83d\udcfa", "\uc138\ud0c1\uae30": "\ud83e\udea7", "\uc624\ube10": "\ud83c\udf73", "\uc804\uc790\ub808\uc778\uc9c0": "\ud83d\udce1", "\uc2dd\uae30\uc138\uccb4\uae30": "\ud83c\udf7d\ufe0f", "\uc8fc\ubc29\ud6c4\ub4dc": "\ud83d\udca8", "\uc8fc\ubc29\ud14c\uc774\ube14\ub80c\uc9c0": "\ud83d\udd25", "\ucda9\uc804\uae30": "\ud83d\udd0c", "\ub85c\ubd07\uccad\uc18c\uae30": "\ud83e\udd16"};
const API_URL = 'https://restapi.emartmall.mn:10443/mn/api/search/elastic';
const API_BODY = {
  catId:'10', store:null, custId:0, value:'', attribute:'', color:'',
  brand:'3629', promotion:'', minPrice:0, maxPrice:0, startsWith:0,
  rowCount:200, orderColumn:'SALEPERCENT_DESC, STARTNEW_DESC, RATE_DESC',
  highlight:false, fashion:0, posMenu:'', module:'', gender:'',
  intent:'', pattern:'', material:'', style:'', deliverys:'', CustomerId:null
};

let products = BASE_PRODUCTS.map(p => Object.assign({}, p));
let currentCategory = '전체';
let liveUpdated = false;

// Build filter buttons
const categories = [...new Set(products.map(p => p.category))].sort();
document.getElementById('catCountEl').textContent = categories.length;
const filterBar = document.getElementById('filterBar');

const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = '전체 (' + products.length + ')';
allBtn.onclick = function() { filterCategory(this, '전체'); };
filterBar.appendChild(allBtn);

categories.forEach(cat => {
  const cnt = products.filter(p => p.category === cat).length;
  const icon = CAT_ICONS[cat] || '\u{1f4e6}';
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = icon + ' ' + cat + ' (' + cnt + ')';
  btn.onclick = function() { filterCategory(this, cat); };
  filterBar.appendChild(btn);
});

function filterCategory(btn, cat) {
  currentCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  let filtered = products;
  if (currentCategory !== '전체') {
    filtered = filtered.filter(p => p.category === currentCategory);
  }
  filtered = [...filtered].sort((a, b) => (parseFloat(b.discount) || 0) - (parseFloat(a.discount) || 0));

  document.getElementById('resultCount').textContent = filtered.length + '개 상품';

  document.getElementById('productGrid').innerHTML = filtered.map(p => {
    const icon = CAT_ICONS[p.category] || '\u{1f4e6}';
    const salePriceT = p.sale_t ? p.sale_t.toLocaleString() + '\u20ae' : '-';
    const salePriceKRW = p.sale_krw ? ' ≈ ₩' + p.sale_krw.toLocaleString() : '';
    const regularPriceT = p.regular_t ? p.regular_t.toLocaleString() + '\u20ae' : '';
    const disc = p.discount ? parseFloat(p.discount) : 0;
    const discountBadge = disc > 0 ? '<div class="discount-badge' + (p.live ? ' updated' : '') + '">-' + Math.round(disc) + '%</div>' : '';
    const imgEl = p.image ? '<img src="' + p.image + '" loading="lazy" onerror="this.style.display=\'none\'">' : '';
    const liveBadge = p.live ? '<span class="price-updated-badge">LIVE</span>' : '';

    return '<div class="product-card" onclick="window.open(\'' + p.url + '\')">' +
      '<div class="card-image-wrap">' +
        discountBadge +
        '<div class="category-tag">' + icon + ' ' + p.category + '</div>' +
        imgEl +
        '<span class="no-image">' + icon + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="product-name">' + p.name + '</div>' +
        '<div class="model-name">&#128273; ' + p.model + '</div>' +
        '<div class="price-section">' +
          '<div class="sale-price">' + salePriceT + liveBadge + '<span class="krw">' + salePriceKRW + '</span></div>' +
          (regularPriceT ? '<div class="regular-price">정상가 ' + regularPriceT + '</div>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function fetchLivePrices() {
  const dot = document.getElementById('liveDot');
  const status = document.getElementById('liveStatus');
  dot.className = 'live-dot pulsing';
  status.textContent = '실시간 가격 가져오는 중...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(API_BODY)
    });
    const data = await res.json();
    const hits = data?.data?.hits?.hits || [];

    // Build lookup by imgnm
    const priceMap = {};
    hits.forEach(h => {
      const src = h._source;
      if (src.imgnm) priceMap[src.imgnm] = src;
    });

    let updatedCount = 0;
    products.forEach(p => {
      const live = priceMap[p.imgnm];
      if (live) {
        p.sale_t = Math.round(live.currentprice);
        p.sale_krw = Math.round(live.currentprice * 0.42);
        p.regular_t = live.price ? Math.round(live.price) : null;
        p.regular_krw = live.price ? Math.round(live.price * 0.42) : null;
        p.discount = live.salepercent ? String(live.salepercent) : p.discount;
        p.live = true;
        updatedCount++;
      }
    });

    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR');
    status.textContent = '마지막 업데이트: ' + timeStr + ' (' + updatedCount + '개 업데이트)';
    dot.className = 'live-dot pulsing';
    liveUpdated = true;
    render();
  } catch (e) {
    dot.className = 'live-dot';
    dot.style.background = '#ff3b3b';
    status.textContent = '업데이트 실패 (오프라인 데이터 표시 중)';
    render();
  }
}

// Initial render then fetch live prices
render();
fetchLivePrices();
</script>
