<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --blue:#1428A0; --blue2:#2253d4; --blue-pale:#e8edf9;
  --bg:#f4f5f8; --white:#fff; --text:#1a1a1a;
  --text2:#555; --text3:#999; --border:#e5e7eb;
  --sh:0 8px 30px rgba(20,40,160,.14); --r:14px;
}
body { font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); }

/* HEADER */
.hdr { background:var(--blue); padding:0 36px; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(20,40,160,.35); }
.hdr-in { max-width:1360px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:60px; }
.logo { font-size:20px; font-weight:800; letter-spacing:.5px; color:#fff; text-decoration:none; display:flex; align-items:center; gap:10px; }
.logo-sub { font-size:12px; font-weight:400; opacity:.7; border-left:1px solid rgba(255,255,255,.3); padding-left:10px; }
.srch { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); border-radius:22px; padding:7px 18px; min-width:260px; transition:.2s; }
.srch:focus-within { background:rgba(255,255,255,.25); }
.srch input { background:none; border:none; outline:none; color:#fff; font-size:13px; width:100%; }
.srch input::placeholder { color:rgba(255,255,255,.55); }

/* TABS */
.tabs { background:#fff; border-bottom:1px solid var(--border); }
.tabs-in { max-width:1360px; margin:0 auto; padding:0 36px; display:flex; }
.tab { padding:15px 28px; font-size:14px; font-weight:600; border:none; background:none; cursor:pointer; color:var(--text3); border-bottom:3px solid transparent; transition:.2s; }
.tab:hover { color:var(--blue); }
.tab.on { color:var(--blue); border-bottom-color:var(--blue); }
.tab .cnt { display:inline-block; background:var(--blue-pale); color:var(--blue); font-size:10px; font-weight:700; padding:1px 6px; border-radius:9px; margin-left:5px; }
.tab.on .cnt { background:var(--blue); color:#fff; }

/* LAYOUT */
.main { max-width:1360px; margin:0 auto; padding:28px 36px; display:flex; gap:24px; align-items:flex-start; }

/* SIDEBAR */
.sidebar { width:200px; flex-shrink:0; position:sticky; top:80px; }
.sb-title { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:10px; padding-left:4px; }
.sb-btn { display:flex; align-items:center; gap:8px; width:100%; padding:9px 12px; border:none; background:none; cursor:pointer; border-radius:9px; font-size:13px; color:var(--text2); transition:.15s; text-align:left; margin-bottom:2px; }
.sb-btn:hover { background:var(--blue-pale); color:var(--blue); }
.sb-btn.on { background:var(--blue); color:#fff; font-weight:700; }
.sb-btn .ico { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
.sb-btn .n { margin-left:auto; font-size:10px; opacity:.65; background:rgba(0,0,0,.07); padding:1px 6px; border-radius:7px; }
.sb-btn.on .n { background:rgba(255,255,255,.25); opacity:1; }

/* PRODUCT AREA */
.prod-area { flex:1; min-width:0; }
.area-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.area-title { font-size:18px; font-weight:700; }
.area-title em { color:var(--blue); font-style:normal; }
.area-count { font-size:12px; color:var(--text3); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:18px; }

/* CARD */
.card { background:var(--white); border-radius:var(--r); border:1px solid var(--border); overflow:hidden; cursor:pointer; transition:.22s; }
.card:hover { transform:translateY(-4px); box-shadow:var(--sh); border-color:#c5d0f0; }

/* CARD THUMB */
.ct { background:linear-gradient(135deg,#f5f7ff,#eaedff); height:175px; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.ct img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; padding:14px; opacity:0; transition:opacity .3s; }
.ct img.ok { opacity:1; }
.ct .fi { font-size:60px; position:relative; z-index:0; transition:opacity .3s; }
.ct.img-ok .fi { opacity:0; }

.bdg { position:absolute; top:10px; left:10px; font-size:9px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; padding:2px 8px; border-radius:20px; z-index:2; }
.b-new{background:#e63;color:#fff} .b-best{background:var(--blue);color:#fff}
.b-ai{background:#7c3aed;color:#fff} .b-bespoke{background:#0a9669;color:#fff} .b-pro{background:#d97706;color:#fff}

.cb { padding:14px 16px; }
.cc { font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.7px; margin-bottom:4px; }
.cn { font-size:14px; font-weight:700; margin-bottom:5px; line-height:1.35; }
.cp { font-size:16px; font-weight:800; color:var(--blue); margin-bottom:5px; }
.cp .pn { font-size:10px; font-weight:400; color:var(--text3); margin-left:4px; }
.cd { font-size:11px; color:var(--text3); line-height:1.5; margin-bottom:10px; }
.ctg { display:flex; flex-wrap:wrap; gap:4px; }
.tg { font-size:9px; font-weight:600; padding:2px 7px; border-radius:5px; background:var(--blue-pale); color:var(--blue); }

/* EMPTY */
.empty { grid-column:1/-1; text-align:center; padding:80px 0; color:var(--text3); }
.empty .eico { font-size:40px; margin-bottom:12px; }

/* MODAL */
.ov { position:fixed; inset:0; background:rgba(0,0,0,.48); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; opacity:0; pointer-events:none; transition:.18s; }
.ov.on { opacity:1; pointer-events:all; }
.modal { background:#fff; border-radius:20px; max-width:500px; width:100%; max-height:88vh; overflow-y:auto; transform:translateY(18px); transition:.18s; }
.ov.on .modal { transform:none; }
.mt { height:220px; position:relative; background:linear-gradient(135deg,#f0f2ff,#e0e6ff); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.mt img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; padding:20px; opacity:0; transition:opacity .3s; z-index:1; }
.mt img.ok { opacity:1; }
.mt .mi { font-size:88px; }
.mt.img-ok .mi { opacity:0; }
.mc { position:absolute; top:12px; right:12px; width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,.15); border:none; cursor:pointer; font-size:16px; color:#fff; display:flex; align-items:center; justify-content:center; z-index:3; }
.mc:hover { background:rgba(0,0,0,.3); }
.mb { padding:24px; }
.mcat { font-size:11px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; }
.mname { font-size:20px; font-weight:800; margin-bottom:6px; }
.mprice { font-size:22px; font-weight:800; color:var(--blue); margin-bottom:4px; }
.mpnote { font-size:11px; color:var(--text3); margin-bottom:14px; }
.mdesc { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:18px; }
.mst { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }
.sr { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:12px; }
.sr:last-child { border:none; }
.sk { color:var(--text3); }
.sv { font-weight:700; color:var(--text); text-align:right; max-width:60%; }
.mtg { display:flex; flex-wrap:wrap; gap:5px; margin:16px 0 20px; }
.mt2 { font-size:11px; font-weight:600; padding:4px 10px; border-radius:6px; background:var(--blue-pale); color:var(--blue); }
.mbtn { display:block; width:100%; padding:13px; background:var(--blue); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }
.mbtn:hover { background:var(--blue2); }

@media(max-width:900px){ .sidebar{display:none;} .main{padding:20px 16px;} .hdr{padding:0 16px;} .tabs-in{padding:0 16px;} }
@media(max-width:480px){ .grid{grid-template-columns:repeat(2,1fr); gap:12px;} }

// ── state ──
let seg='b2c', cat='all', q='';

// ── 이미지 로드 핸들러 ──
function imgOk(el){
  el.classList.add('ok');
  el.closest('.ct, .mt').classList.add('img-ok');
}
function imgErr(el){ el.remove(); }

// ── 카드 렌더링 ──
function cardHtml(p){
  const b = p.badge && BADGE[p.badge] ? `<span class="bdg ${BADGE[p.badge].cls}">${BADGE[p.badge].t}</span>` : '';
  const imgTag = p.img ? `<img src="${p.img}" alt="${p.name}" loading="lazy" onload="imgOk(this)" onerror="imgErr(this)">` : '';
  const tags = (p.tags||[]).slice(0,3).map(t=>`<span class="tg">${t}</span>`).join('');
  return `<div class="card" onclick="openModal(${p.id})">
    <div class="ct">${b}${imgTag}<span class="fi">${p.ico}</span></div>
    <div class="cb">
      <div class="cc">${p.cat}</div>
      <div class="cn">${p.name}</div>
      <div class="cp">${p.price}<span class="pn">${p.pnote}</span></div>
      <div class="cd">${p.desc.slice(0,55)}${p.desc.length>55?'…':''}</div>
      <div class="ctg">${tags}</div>
    </div>
  </div>`;
}

// ── 사이드바 ── (onclick에 단일따옴표 사용 → HTML 속성 충돌 방지)
function renderSb(){
  const counts={};
  P[seg].forEach(p=>{ counts[p.cat]=(counts[p.cat]||0)+1; });
  const all=P[seg].length;
  document.getElementById('sb').innerHTML=
    `<button class="sb-btn${cat==='all'?' on':''}" onclick="setCat('all')">
       <span class="ico">📦</span>전체 보기<span class="n">${all}</span>
     </button>`+
    Object.entries(counts).map(([c,n])=>{
      const safe=c.replace(/'/g,"\\'");
      return `<button class="sb-btn${cat===c?' on':''}" onclick="setCat('${safe}')">
        <span class="ico">${CICO[c]||'▪️'}</span>${c}<span class="n">${n}</span>
      </button>`;
    }).join('');
}

// ── 메인 렌더 ──
function render(){
  let items=P[seg];
  if(cat!=='all') items=items.filter(p=>p.cat===cat);
  if(q) items=items.filter(p=>
    p.name.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)||
    p.cat.toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q))||
    p.price.includes(q)
  );
  renderSb();
  document.getElementById('atitle').innerHTML=(cat==='all'?'전체':cat)+' <em>'+(seg==='b2c'?'B2C':'B2B')+'</em>';
  document.getElementById('acount').textContent=items.length+'개 제품';
  const g=document.getElementById('grid');
  if(!items.length){
    g.innerHTML='<div class="empty"><div class="eico">🔍</div><p>검색 결과가 없습니다.</p></div>';
    return;
  }
  g.innerHTML=items.map(cardHtml).join('');
}

// ── 탭 전환 ──
function setSeg(s){
  seg=s; cat='all';
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.seg===s));
  render();
}

// ── 카테고리 전환 ──
function setCat(c){ cat=c; render(); }

// ── 모달 ──
function openModal(id){
  const p=[...P.b2c,...P.b2b].find(x=>x.id===id);
  if(!p) return;
  const imgTag=p.img?`<img src="${p.img}" alt="${p.name}" onload="imgOk(this)" onerror="imgErr(this)">`:'';
  const b=p.badge&&BADGE[p.badge]?`<span class="bdg ${BADGE[p.badge].cls}" style="position:static;display:inline-block;margin-bottom:8px">${BADGE[p.badge].t}</span>`:'';
  document.getElementById('mthumb').innerHTML=`${imgTag}<span class="mi">${p.ico}</span><button class="mc" onclick="closeModal()">✕</button>`;
  document.getElementById('mcat').textContent=p.cat;
  document.getElementById('mname').innerHTML=b+p.name;
  document.getElementById('mprice').textContent=p.price;
  document.getElementById('mpnote').textContent=p.pnote;
  document.getElementById('mdesc').textContent=p.desc;
  document.getElementById('mspecs').innerHTML=Object.entries(p.specs||{}).map(([k,v])=>`<div class="sr"><span class="sk">${k}</span><span class="sv">${v}</span></div>`).join('');
  document.getElementById('mtags').innerHTML=(p.tags||[]).map(t=>`<span class="mt2">${t}</span>`).join('');
  document.getElementById('ov').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeOv(e){ if(e.target===document.getElementById('ov')) closeModal(); }
function closeModal(){ document.getElementById('ov').classList.remove('on'); document.body.style.overflow=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ── 초기화 ──
document.getElementById('cnt-b2c').textContent=P.b2c.length;
document.getElementById('cnt-b2b').textContent=P.b2b.length;
document.getElementById('q').addEventListener('input',e=>{ q=e.target.value.toLowerCase().trim(); render(); });
render();
</script>
