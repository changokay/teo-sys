<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>몽골 뉴스 인사이트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: #f8fafc;
  color: #111;
  min-height: 100vh;
}
.wrap { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

/* 헤더 */
.header { margin-bottom: 32px; }
.header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
.meta { display: flex; align-items: center; gap: 14px; font-size: 13px; color: #888; flex-wrap: wrap; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.refresh-btn {
  background: none; border: 1px solid #d1d5db; border-radius: 6px;
  padding: 3px 10px; font-size: 12px; cursor: pointer; color: #555;
  transition: background .12s;
}
.refresh-btn:hover { background: #f1f5f9; }
.refresh-btn:disabled { opacity: .4; cursor: default; }

/* 카드 */
.news-list { display: flex; flex-direction: column; gap: 14px; }
.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 20px;
  transition: box-shadow .15s;
}
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); }
.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.source-badge {
  font-size: 11px; font-weight: 600;
  background: #f1f5f9; color: #475569;
  padding: 2px 8px; border-radius: 20px;
}
.pub-date { font-size: 12px; color: #9ca3af; }
.card-title {
  font-size: 16px; font-weight: 600; line-height: 1.45;
  margin-bottom: 12px;
}
.card-title a { color: #111; text-decoration: none; }
.card-title a:hover { color: #2563eb; }
.insight {
  background: #fffbeb;
  border-left: 4px solid #f59e0b;
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
}
.insight-label { font-size: 11px; font-weight: 700; color: #b45309; margin-bottom: 4px; }
.insight-text { font-size: 13px; color: #78350f; line-height: 1.7; }

/* 스켈레톤 */
.skeleton { background: #e5e7eb; border-radius: 4px; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.5} }

/* 오류 */
.error {
  background: #fef2f2; border: 1px solid #fecaca;
  color: #b91c1c; border-radius: 10px;
  padding: 16px 20px; font-size: 14px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🇲🇳 몽골 뉴스 인사이트</h1>
    <div class="meta">
      <span id="updated-at"></span>
      <span><span class="dot"></span> <span id="countdown">05:00</span> 후 자동 새로고침</span>
      <button class="refresh-btn" id="refresh-btn" onclick="load()">지금 새로고침</button>
    </div>
    <div style="font-size:12px;color:#aaa;margin-top:6px;">Google 뉴스 '몽골' 키워드 한국어 기사 · AI 사업적 의미 분석</div>
  </div>
  <!-- API 키 설정 -->
<div id="key-setup" style="display:none; background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:24px; margin-bottom:24px;">
  <div style="font-size:15px; font-weight:600; margin-bottom:6px;">🔑 Groq API 키 설정</div>
  <div style="font-size:13px; color:#888; margin-bottom:14px;">console.groq.com에서 무료로 발급받을 수 있습니다.</div>
  <div style="display:flex; gap:8px;">
    <input id="key-input" type="password" placeholder="gsk_..." style="flex:1; padding:8px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; outline:none;">
    <button onclick="saveKey()" style="background:#2563eb; color:#fff; border:none; border-radius:8px; padding:8px 18px; font-size:14px; cursor:pointer;">저장</button>
  </div>
</div>
<div id="news-list" class="news-list"></div>
</div>

<script>
let GROQ_API_KEY = localStorage.getItem('groq_api_key') || '';
const RSS_URL = 'https://news.google.com/rss/search?q=%EB%AA%BD%EA%B3%A8&hl=ko&gl=KR&ceid=KR:ko';
const PROXY = 'https://api.allorigins.win/raw?url=';

let refreshTimer, countdownTimer, countdownSec = 300;
let isLoading = false;

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d.getTime())) return '';
  return `${d.getMonth()+1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function cleanTitle(t) { return t.replace(/ - [^-]+$/, '').trim(); }
function extractSource(t) { const m = t.match(/ - ([^-]+)$/); return m ? m[1].trim() : ''; }

function showSkeleton() {
  const list = document.getElementById('news-list');
  list.innerHTML = Array.from({length:5}).map(() => `
    <div class="card">
      <div class="card-meta">
        <div class="skeleton" style="width:60px;height:18px;"></div>
        <div class="skeleton" style="width:80px;height:14px;"></div>
      </div>
      <div class="skeleton" style="width:80%;height:20px;margin-bottom:12px;"></div>
      <div style="padding:10px 14px;background:#fffbeb;border-left:4px solid #f59e0b;border-radius:0 8px 8px 0;">
        <div class="skeleton" style="width:100%;height:14px;margin-bottom:6px;"></div>
        <div class="skeleton" style="width:85%;height:14px;"></div>
      </div>
    </div>`).join('');
}

async function fetchRSS() {
  const url = PROXY + encodeURIComponent(RSS_URL);
  const res = await fetch(url);
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, 'application/xml');
  const items = [...xml.querySelectorAll('item')].slice(0, 20);
  return items.map(item => ({
    title: cleanTitle(item.querySelector('title')?.textContent || ''),
    link: item.querySelector('link')?.textContent || '',
    pubDate: item.querySelector('pubDate')?.textContent || '',
    source: extractSource(item.querySelector('title')?.textContent || ''),
  })).filter(i => i.title);
}

async function analyzeWithGroq(newsItems) {
  const listText = newsItems.map((item, i) => `${i+1}. ${item.title}`).join('\n');
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${GROQ_API_KEY}`,
    },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      response_format: { type: 'json_object' },
      messages: [
        { role: 'system', content: '당신은 몽골 시장 전문 비즈니스 애널리스트입니다. 반드시 JSON 형식으로만 응답하세요.' },
        { role: 'user', content:
          `아래 뉴스들을 한국 사업가 관점에서 분석해주세요.\n각 항목마다 2~3문장으로: 시장 기회/리스크, 관련 산업, 한국 기업 시사점을 포함하세요.\n\n${listText}\n\n반드시 아래 JSON 형식만 출력하세요:\n{"insights":["1번 분석","2번 분석","3번 분석",...]}`
        },
      ],
      temperature: 0.7,
    }),
  });
  const data = await res.json();
  const text = data.choices?.[0]?.message?.content || '{}';
  const parsed = JSON.parse(text);
  return Array.isArray(parsed.insights)
    ? parsed.insights.map(i => typeof i === 'object' ? Object.values(i).join(' ') : String(i))
    : newsItems.map(() => '분석 불가');
}

function renderNews(items, insights) {
  const list = document.getElementById('news-list');
  if (!items.length) {
    list.innerHTML = '<div class="error">뉴스를 불러올 수 없습니다.</div>';
    return;
  }
  list.innerHTML = items.map((item, i) => `
    <div class="card">
      <div class="card-meta">
        ${item.source ? `<span class="source-badge">${item.source}</span>` : ''}
        ${item.pubDate ? `<span class="pub-date">${formatDate(item.pubDate)}</span>` : ''}
      </div>
      <div class="card-title">
        <a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a>
      </div>
      <div class="insight">
        <div class="insight-label">💡 사업적 의미</div>
        <div class="insight-text">${insights[i] || '분석 중...'}</div>
      </div>
    </div>`).join('');
}

async function load() {
  if (isLoading) return;
  isLoading = true;
  document.getElementById('refresh-btn').disabled = true;
  showSkeleton();

  try {
    const news = await fetchRSS();
    const insights = await analyzeWithGroq(news);
    renderNews(news, insights);
    document.getElementById('updated-at').textContent = `업데이트: ${formatDate(new Date().toISOString())}`;
  } catch(e) {
    document.getElementById('news-list').innerHTML = `<div class="error">오류: ${e.message}</div>`;
  }

  isLoading = false;
  document.getElementById('refresh-btn').disabled = false;
  resetCountdown();
}

function resetCountdown() {
  countdownSec = 300;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownSec--;
    const m = String(Math.floor(countdownSec/60)).padStart(2,'0');
    const s = String(countdownSec%60).padStart(2,'0');
    document.getElementById('countdown').textContent = `${m}:${s}`;
    if (countdownSec <= 0) { clearInterval(countdownTimer); load(); }
  }, 1000);
}

function saveKey() {
  const key = document.getElementById('key-input').value.trim();
  if (!key) return;
  GROQ_API_KEY = key;
  localStorage.setItem('groq_api_key', key);
  document.getElementById('key-setup').style.display = 'none';
  load();
}

if (!GROQ_API_KEY) {
  document.getElementById('key-setup').style.display = 'block';
} else {
  load();
}
</script>
</body>
</html>
