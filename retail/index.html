<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>몽골 리테일 체인 점포 현황</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: #f0f2f5; color: #1a1a2e; height: 100vh; display: flex; flex-direction: column; }

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #C4180A 0%, #8B0000 100%);
  color: white; padding: 14px 20px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.25); flex-shrink: 0;
}
.flag { font-size: 28px; }
.header-text h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
.header-text p { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.header-stats { margin-left: auto; display: flex; gap: 16px; text-align: center; }
.stat-item { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 6px 14px; }
.stat-num { font-size: 20px; font-weight: 900; }
.stat-label { font-size: 10px; opacity: 0.8; }

/* ── Layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 340px; flex-shrink: 0;
  background: white; display: flex; flex-direction: column;
  border-right: 1px solid #e0e0e0; overflow: hidden;
}
.sidebar-top { padding: 12px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
.search-box {
  width: 100%; padding: 8px 12px; border: 1.5px solid #ddd;
  border-radius: 8px; font-size: 13px; outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: #C4180A; }

.filter-section { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
.filter-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  padding: 4px 10px; border: 1.5px solid #ddd; border-radius: 20px;
  font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.18s;
  background: white; color: #555; white-space: nowrap;
}
.chip:hover { border-color: #C4180A; color: #C4180A; }
.chip.active { background: #C4180A; border-color: #C4180A; color: white; }

.store-count { padding: 8px 12px; font-size: 12px; color: #888; flex-shrink: 0; }
.store-count strong { color: #C4180A; }

.store-list { overflow-y: auto; flex: 1; }
.store-card {
  padding: 12px 14px; border-bottom: 1px solid #f5f5f5;
  cursor: pointer; transition: background 0.15s; display: flex; gap: 10px; align-items: flex-start;
}
.store-card:hover { background: #fef5f5; }
.store-card.selected { background: #fff0f0; border-left: 3px solid #C4180A; }

.store-icon {
  width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: white;
}
.store-info { flex: 1; min-width: 0; }
.store-name { font-size: 13px; font-weight: 700; color: #1a1a2e; }
.store-chain { font-size: 11px; font-weight: 600; margin-top: 1px; }
.store-meta { font-size: 11px; color: #888; margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
.store-meta span { display: flex; align-items: center; gap: 2px; }
.open-badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 700; flex-shrink: 0; align-self: flex-start; margin-top: 3px; }
.open { background: #e8f8ef; color: #1a7a3f; }
.closed { background: #fee; color: #c00; }

/* ── Map ── */
#map { width: 100%; height: 100%; min-height: 400px; }

/* ── Detail Panel ── */
.detail-panel {
  position: absolute; bottom: 20px; right: 20px; z-index: 1000;
  background: white; border-radius: 14px; padding: 18px 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.18); width: 300px;
  display: none; border-top: 4px solid #C4180A;
}
.detail-panel.visible { display: block; }
.detail-close { position: absolute; top: 10px; right: 12px; cursor: pointer; font-size: 18px; color: #aaa; line-height: 1; }
.detail-close:hover { color: #333; }
.detail-chain { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
.detail-name { font-size: 18px; font-weight: 800; color: #1a1a2e; }
.detail-rows { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }
.detail-row { display: flex; gap: 8px; font-size: 12px; }
.detail-row .icon { width: 18px; text-align: center; flex-shrink: 0; }
.detail-row .val { color: #444; }
.detail-row .val strong { color: #1a1a2e; }
.detail-tags { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 12px; background: #f0f0f0; color: #555; font-weight: 600; }

/* ── Custom Markers ── */
.custom-marker {
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 2.5px solid white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  font-weight: 900; color: white; cursor: pointer;
  transition: box-shadow 0.2s;
}
.custom-marker.selected {
  box-shadow: 0 0 0 3px white, 0 0 0 6px currentColor, 0 4px 12px rgba(0,0,0,0.4);
}
.map-wrapper { position: relative; flex: 1; display: flex; flex-direction: column; }

/* 매출 범례 */
.sales-legend {
  position: absolute; bottom: 30px; left: 12px; z-index: 1000;
  background: white; border-radius: 10px; padding: 10px 14px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.15); font-size: 11px;
}
.legend-title { font-weight: 700; color: #555; margin-bottom: 8px; }
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.legend-circle {
  border-radius: 50%; background: #999; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;
}
.legend-label { color: #666; }

/* 매출 바 (카드) */
.sales-bar-wrap { margin-top: 4px; }
.sales-bar-bg { height: 4px; background: #f0f0f0; border-radius: 2px; }
.sales-bar-fill { height: 4px; border-radius: 2px; transition: width 0.3s; }
.sales-text { font-size: 10px; color: #aaa; margin-top: 1px; }

/* Scrollbar styling */
.store-list::-webkit-scrollbar { width: 4px; }
.store-list::-webkit-scrollbar-track { background: #f9f9f9; }
.store-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

/* ── 사이드바 핸들 (모바일 전용) ── */
.sidebar-handle {
  display: none;
  justify-content: center; align-items: center;
  padding: 10px 0 4px; cursor: pointer; flex-shrink: 0;
}
.handle-bar { width: 40px; height: 4px; background: #ddd; border-radius: 2px; }

/* ── 모바일 토글 버튼 ── */
.map-toggle-btn {
  display: none;
  position: absolute; bottom: 100px; right: 14px; z-index: 1001;
  background: white; border: none; border-radius: 50%;
  width: 48px; height: 48px; box-shadow: 0 3px 12px rgba(0,0,0,0.25);
  font-size: 20px; cursor: pointer; align-items: center; justify-content: center;
}

/* ── 모바일 반응형 ── */
@media (max-width: 768px) {
  .header { padding: 10px 14px; gap: 8px; }
  .flag { font-size: 22px; }
  .header-text h1 { font-size: 14px; }
  .header-text p { display: none; }
  .header-stats { gap: 8px; }
  .stat-item { padding: 4px 8px; }
  .stat-num { font-size: 15px; }
  .stat-label { font-size: 9px; }

  .main { position: relative; }

  /* 사이드바 → 하단 시트 */
  .sidebar {
    position: absolute; bottom: 0; left: 0; right: 0;
    width: 100%; height: auto; max-height: 72vh;
    border-right: none;
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
    z-index: 1500;
    transform: translateY(calc(100% - 52px));
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  }
  .sidebar.sheet-open { transform: translateY(0); }

  .sidebar-handle { display: flex; }

  /* 검색창이 핸들 탭 역할도 함 */
  .sidebar-top { padding: 8px 12px 10px; cursor: pointer; }

  /* 필터/리스트는 접힌 상태에서 숨김 */
  .filter-section, .store-count, .store-list { transition: opacity 0.2s; }
  .sidebar:not(.sheet-open) .filter-section,
  .sidebar:not(.sheet-open) .store-count,
  .sidebar:not(.sheet-open) .store-list { opacity: 0; pointer-events: none; }

  /* 상세 패널 모바일 */
  .detail-panel {
    bottom: 60px; left: 12px; right: 12px; width: auto;
    max-height: 60vh; overflow-y: auto;
  }

  /* 범례 모바일 */
  .sales-legend { bottom: 60px; left: 8px; padding: 7px 10px; font-size: 10px; }
  .legend-circle { transform: scale(0.85); }

  .map-toggle-btn { display: flex; }
}
</style>
</head>

const SALES_MIN = 28, SALES_MAX = 3200;

function salesSize(id) {
  const s = SALES[id] || 100;
  const t = (Math.log(s) - Math.log(SALES_MIN)) / (Math.log(SALES_MAX) - Math.log(SALES_MIN));
  return Math.round(14 + t * 46); // 14px ~ 60px
}

function salesPct(id) {
  const s = SALES[id] || 100;
  return Math.round((Math.log(s) - Math.log(SALES_MIN)) / (Math.log(SALES_MAX) - Math.log(SALES_MIN)) * 100);
}

// ─── 상태 ──────────────────────────────────────────────────────────────────
let filterChain = "전체", filterDistrict = "전체", filterType = "전체";
let selectedId = null;
let markers = {};

// ─── 영업 여부 계산 ────────────────────────────────────────────────────────
function isOpen(hours) {
  const now = new Date();
  const cur = now.getHours() * 60 + now.getMinutes();
  const [open, close] = hours.split("-").map(t => {
    const [h, m] = t.split(":").map(Number);
    return h * 60 + m;
  });
  return cur >= open && cur < close;
}

// ─── 필터링 ────────────────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  return STORES.filter(s => {
    if (filterChain !== "전체" && s.chain !== filterChain) return false;
    if (filterDistrict !== "전체" && s.district !== filterDistrict) return false;
    if (filterType !== "전체" && s.type !== filterType) return false;
    if (q && !s.name.toLowerCase().includes(q) && !s.address.toLowerCase().includes(q) && !s.district.includes(q)) return false;
    return true;
  });
}

// ─── 지도 초기화 ──────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl: false }).setView([47.9077, 106.9184], 12);
L.control.zoom({ position: "topright" }).addTo(map);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors",
  maxZoom: 19
}).addTo(map);

function makeMarkerIcon(chain, size, selected = false, id = null) {
  const c = CHAINS[chain];
  const sel = selected ? `box-shadow:0 0 0 3px white,0 0 0 6px ${c.color},0 4px 14px rgba(0,0,0,0.4);` : '';
  return L.divIcon({
    html: `<div class="custom-marker" style="width:${size}px;height:${size}px;background:${c.color};font-size:${Math.max(9,Math.round(size*0.36))}px;${sel}">${size >= 22 ? c.emoji : ''}</div>`,
    className: "", iconSize: [size, size], iconAnchor: [size/2, size/2]
  });
}

function addMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  getFiltered().forEach(s => {
    const sz = salesSize(s.id);
    const m = L.marker([s.lat, s.lng], { icon: makeMarkerIcon(s.chain, sz, s.id === selectedId, s.id) }).addTo(map);
    m.on("click", () => {
      const url = CHAINS[s.chain]?.url;
      if (url) window.open(url, '_blank', 'noopener');
      selectStore(s.id);
    });
    markers[s.id] = m;
  });
}

// ─── 점포 선택 ────────────────────────────────────────────────────────────
function selectStore(id) {
  selectedId = id;
  const s = STORES.find(x => x.id === id);
  if (!s) return;

  // 리스트 하이라이트
  document.querySelectorAll(".store-card").forEach(el => el.classList.remove("selected"));
  const card = document.querySelector(`.store-card[data-id="${id}"]`);
  if (card) { card.classList.add("selected"); card.scrollIntoView({ block: "nearest" }); }

  // 지도 이동
  map.setView([s.lat, s.lng], 15, { animate: true });

  // 선택 마커 하이라이트 (크기는 매출 기준 유지)
  Object.entries(markers).forEach(([mid, mk]) => {
    const st = STORES.find(x => x.id == mid);
    mk.setIcon(makeMarkerIcon(st.chain, salesSize(st.id), mid == id, st.id));
  });

  // 상세 패널
  const c = CHAINS[s.chain];
  document.getElementById("dChain").textContent = `${c.label} · ${s.chain}`;
  document.getElementById("dChain").style.color = c.color;
  document.getElementById("dName").textContent = s.name;
  const sv = SALES[s.id] || 0;
  const sp = salesPct(s.id);
  document.getElementById("dRows").innerHTML = `
    <div class="detail-row"><span class="icon">📍</span><span class="val">${s.address}</span></div>
    <div class="detail-row"><span class="icon">🏘️</span><span class="val">${s.district}구</span></div>
    <div class="detail-row"><span class="icon">🏬</span><span class="val">${s.type} · 지상 ${s.floors}층</span></div>
    <div class="detail-row"><span class="icon">💰</span><span class="val">
      <strong style="color:#C4180A">${sv.toLocaleString()}억₮</strong><span style="font-size:10px;color:#aaa;margin-left:4px">/연</span>
      <div class="sales-bar-bg" style="margin-top:4px"><div class="sales-bar-fill" style="width:${sp}%;background:${CHAINS[s.chain].color}"></div></div>
    </span></div>
    <div class="detail-row"><span class="icon">🕐</span><span class="val">
      <strong>${s.hours}</strong>
      <span class="open-badge ${isOpen(s.hours) ? 'open' : 'closed'}">${isOpen(s.hours) ? '영업 중' : '영업 종료'}</span>
    </span></div>
    <div class="detail-row"><span class="icon">📞</span><span class="val">${s.phone}</span></div>
  `;
  document.getElementById("dTags").innerHTML = s.tags.map(t => `<span class="tag">${t}</span>`).join("");
  const btn = document.getElementById("dWebBtn");
  const url = c.url;
  if (url) { btn.href = url; btn.style.display = "block"; btn.style.borderColor = c.color; btn.style.color = c.color; }
  else { btn.style.display = "none"; }
  document.getElementById("detailPanel").classList.add("visible");
}

function closeDetail() {
  selectedId = null;
  document.getElementById("detailPanel").classList.remove("visible");
  document.querySelectorAll(".store-card").forEach(el => el.classList.remove("selected"));
  Object.entries(markers).forEach(([mid, mk]) => {
    const st = STORES.find(x => x.id == mid);
    mk.setIcon(makeMarkerIcon(st.chain, salesSize(st.id), false, st.id));
  });
}

// ─── 리스트 렌더 ──────────────────────────────────────────────────────────
function renderList() {
  const filtered = getFiltered();
  const list = document.getElementById("storeList");
  document.getElementById("storeCount").innerHTML =
    `<strong>${filtered.length}</strong>개 점포 표시 중 (전체 ${STORES.length}개)`;

  list.innerHTML = filtered.map(s => {
    const c = CHAINS[s.chain];
    const open = isOpen(s.hours);
    return `
      <div class="store-card" data-id="${s.id}" onclick="selectStore(${s.id})">
        <div class="store-icon" style="background:${c.color}">${c.emoji}</div>
        <div class="store-info">
          <div class="store-name">${s.name}</div>
          <div class="store-chain" style="color:${c.color}">${s.chain} · ${s.type}</div>
          <div class="store-meta">
            <span>🏘️ ${s.district}</span>
            <span>🏬 ${s.floors}층</span>
            <span>🕐 ${s.hours}</span>
          </div>
          <div class="sales-bar-wrap">
            <div class="sales-bar-bg"><div class="sales-bar-fill" style="width:${salesPct(s.id)}%;background:${c.color}"></div></div>
            <div class="sales-text">💰 ${(SALES[s.id]||0).toLocaleString()}억₮/연</div>
          </div>
        </div>
        <span class="open-badge ${open ? 'open' : 'closed'}">${open ? '영업중' : '종료'}</span>
      </div>`;
  }).join("");

  if (filtered.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:#aaa;font-size:13px;">검색 결과가 없습니다</div>`;
  }
  addMarkers();
}

// ─── 필터 UI 렌더 ─────────────────────────────────────────────────────────
function renderFilters() {
  const chains = ["전체", ...Object.keys(CHAINS)];
  const districts = ["전체", ...new Set(STORES.map(s => s.district))];
  const types = ["전체", ...new Set(STORES.map(s => s.type))];

  function makeChips(items, current, setter, containerId) {
    const c = document.getElementById(containerId);
    c.innerHTML = items.map(v => `
      <div class="chip ${v === current ? 'active' : ''}" onclick="(${setter.toString()})('${v}')">${v}</div>
    `).join("");
  }

  makeChips(chains, filterChain, v => { filterChain = v; refresh(); }, "chainFilters");
  makeChips(districts, filterDistrict, v => { filterDistrict = v; refresh(); }, "districtFilters");
  makeChips(types, filterType, v => { filterType = v; refresh(); }, "typeFilters");
}

function refresh() {
  renderFilters();
  renderList();
  updateHeaderStats();
}

// ─── 헤더 통계 ────────────────────────────────────────────────────────────
function updateHeaderStats() {
  const f = getFiltered();
  document.getElementById("totalStores").textContent = f.length;
  document.getElementById("totalChains").textContent = new Set(f.map(s => s.chain)).size;
  document.getElementById("openNow").textContent = f.filter(s => isOpen(s.hours)).length;
}

// ─── 모바일 시트 토글 ─────────────────────────────────────────────────────
function toggleSheet() {
  if (window.innerWidth > 768) return;
  const sb = document.getElementById("sidebar");
  sb.classList.toggle("sheet-open");
  // 검색창 클릭 시 열릴 때 포커스 이동 방지
  if (!sb.classList.contains("sheet-open")) document.activeElement?.blur();
}
// 지도 클릭 시 시트 닫기
map.on("click", () => {
  if (window.innerWidth <= 768)
    document.getElementById("sidebar").classList.remove("sheet-open");
});

// ─── 검색 ─────────────────────────────────────────────────────────────────
document.getElementById("searchInput").addEventListener("input", () => refresh());
// 검색창 직접 입력 시 시트 열기 (모바일)
document.getElementById("searchInput").addEventListener("focus", () => {
  if (window.innerWidth <= 768)
    document.getElementById("sidebar").classList.add("sheet-open");
});

// ─── 초기화 ───────────────────────────────────────────────────────────────
refresh();
</script>
